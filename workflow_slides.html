<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NASS 3DGS Simulation Pipeline - Technical Blueprint Deck</title>
  <style>
    :root {
      --bg-color: #0b0f19;
      --card-bg: rgba(17, 24, 39, 0.55);
      --border-color: rgba(34, 197, 94, 0.15);
      --primary-color: #22c55e;
      --text-color: #f3f4f6;
      --text-muted: #6b7280;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      overflow: hidden;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      background-image: radial-gradient(circle at 10% 20%, rgba(34, 197, 94, 0.03) 0%, transparent 45%);
    }

    header {
      padding: 1.5rem 3rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(255, 255, 255, 0.03);
      z-index: 10;
    }

    .logo {
      font-weight: 800;
      font-size: 1.1rem;
      letter-spacing: 2px;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .logo span {
      color: var(--primary-color);
    }

    .slide-counter {
      font-size: 0.85rem;
      color: var(--text-muted);
      letter-spacing: 1px;
    }

    .presentation-container {
      flex: 1;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .slide {
      position: absolute;
      width: 92%;
      max-width: 1200px;
      height: 82%;
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      border: 1px solid var(--border-color);
      border-radius: 20px;
      opacity: 0;
      transform: translateY(10px) scale(0.99);
      transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1);
      pointer-events: none;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .slide.active {
      opacity: 1;
      transform: translateY(0) scale(1);
      pointer-events: auto;
      z-index: 5;
    }

    .slide-body {
      flex: 1;
      display: flex;
      position: relative;
      width: 100%;
      height: 100%;
    }

    .slide-label {
      position: absolute;
      top: 2rem;
      left: 2.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
      z-index: 10;
    }

    .slide-num {
      font-size: 1.8rem;
      font-weight: 900;
      color: var(--primary-color);
      font-family: monospace;
      letter-spacing: -1px;
    }

    .slide-title {
      font-size: 0.85rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 3px;
      color: #9ca3af;
    }

    .slide-visual-full {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      background: rgba(0, 0, 0, 0.25);
    }

    .slide-visual-full img {
      max-width: 85%;
      max-height: 85%;
      object-fit: contain;
    }

    /* Title Slide Specifics */
    .slide.title-slide {
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .title-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
    }

    .title-line {
      width: 60px;
      height: 2px;
      background: var(--primary-color);
    }

    .title-content h1 {
      font-size: 3rem;
      font-weight: 900;
      letter-spacing: 8px;
      color: #fff;
      text-transform: uppercase;
    }

    .title-content p {
      font-size: 0.9rem;
      letter-spacing: 4px;
      color: var(--text-muted);
      text-transform: uppercase;
    }

    footer {
      padding: 1.5rem 3rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 1px solid rgba(255, 255, 255, 0.03);
      z-index: 10;
    }

    .nav-buttons {
      display: flex;
      gap: 0.8rem;
    }

    .nav-btn {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: #9ca3af;
      padding: 0.5rem 1.2rem;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.8rem;
      letter-spacing: 1px;
      font-weight: 600;
      text-transform: uppercase;
      transition: all 0.3s;
    }

    .nav-btn:hover {
      background: rgba(34, 197, 94, 0.08);
      border-color: rgba(34, 197, 94, 0.3);
      color: var(--primary-color);
    }

    .keyboard-hint {
      font-size: 0.75rem;
      color: var(--text-muted);
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>

  <header>
    <div class="logo"><span>NASS</span> PIPELINE // BLUEPRINTS</div>
    <div class="slide-counter" id="slide-counter">01 / 06</div>
  </header>

  <div class="presentation-container">

    <!-- SLIDE 1: Title Slide -->
    <div class="slide title-slide active" id="slide-0">
      <div class="title-content">
        <h1>NASS 3DGS</h1>
        <div class="title-line"></div>
        <p>Simulation Technical Architecture</p>
      </div>
    </div>

    <!-- SLIDE 2: Step 1 - Image Reference Gathering -->
    <div class="slide" id="slide-1">
      <div class="slide-body">
        <div class="slide-label">
          <div class="slide-num">01</div>
          <div class="slide-title">Multi-Angle Sourcing</div>
        </div>
        <div class="slide-visual-full">
          <img src="./nass_sourcing_blueprint.png" alt="Multi-Angle Sourcing Wireframe">
        </div>
      </div>
    </div>

    <!-- SLIDE 3: Step 2 - Video Generation -->
    <div class="slide" id="slide-2">
      <div class="slide-body">
        <div class="slide-label">
          <div class="slide-num">02</div>
          <div class="slide-title">Higgsfield Path Interpolation</div>
        </div>
        <div class="slide-visual-full">
          <img src="./video_stitching_flowchart.png" alt="Higgsfield Timeline Stitching Flowchart">
        </div>
      </div>
    </div>

    <!-- SLIDE 4: Step 3 - Gaussian Splat Generation -->
    <div class="slide" id="slide-3">
      <div class="slide-body">
        <div class="slide-label">
          <div class="slide-num">03</div>
          <div class="slide-title">3DGS Point Cloud Extraction</div>
        </div>
        <div class="slide-visual-full">
          <img src="./gaussian_splat_schematic.png" alt="Gaussian Splat 3D Space Bounding Box">
        </div>
      </div>
    </div>

    <!-- SLIDE 5: Step 4 - SupaSplat Optimization -->
    <div class="slide" id="slide-4">
      <div class="slide-body">
        <div class="slide-label">
          <div class="slide-num">04</div>
          <div class="slide-title">SupaSplat Viewport Layout</div>
        </div>
        <div class="slide-visual-full">
          <img src="./supasplat_wireframe_viewport.png" alt="SupaSplat Editor Layout Bounding Boxes">
        </div>
      </div>
    </div>

    <!-- SLIDE 6: Step 5 - Runtime Integration -->
    <div class="slide" id="slide-5">
      <div class="slide-body">
        <div class="slide-label">
          <div class="slide-num">05</div>
          <div class="slide-title">Interactive WebGL Dashboard</div>
        </div>
        <div class="slide-visual-full">
          <img src="./simulation_dashboard_wireframe.png" alt="Web Simulation Dashboard UI layout wireframe">
        </div>
      </div>
    </div>

  </div>

  <footer>
    <div class="keyboard-hint">Use Keyboard ← / → or click buttons</div>
    <div class="nav-buttons">
      <button class="nav-btn" id="prev-btn">PREV</button>
      <button class="nav-btn" id="next-btn">NEXT</button>
    </div>
  </footer>

  <script>
    const slides = document.querySelectorAll('.slide');
    const prevBtn = document.getElementById('prev-btn');
    const nextBtn = document.getElementById('next-btn');
    const slideCounter = document.getElementById('slide-counter');
    let currentSlide = 0;

    function updateSlides() {
      slides.forEach((slide, index) => {
        if (index === currentSlide) {
          slide.classList.add('active');
        } else {
          slide.classList.remove('active');
        }
      });
      slideCounter.innerText = `${String(currentSlide + 1).padStart(2, '0')} / ${String(slides.length).padStart(2, '0')}`;
      
      // Update buttons
      if (currentSlide === 0) {
        prevBtn.style.visibility = 'hidden';
      } else {
        prevBtn.style.visibility = 'visible';
      }

      if (currentSlide === slides.length - 1) {
        nextBtn.innerText = 'RESET';
      } else {
        nextBtn.innerText = 'NEXT';
      }
    }

    prevBtn.addEventListener('click', () => {
      if (currentSlide > 0) {
        currentSlide--;
        updateSlides();
      }
    });

    nextBtn.addEventListener('click', () => {
      if (currentSlide < slides.length - 1) {
        currentSlide++;
      } else {
        currentSlide = 0;
      }
      updateSlides();
    });

    // Keyboard navigation
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight' || e.key === ' ') {
        if (currentSlide < slides.length - 1) {
          currentSlide++;
          updateSlides();
        } else {
          currentSlide = 0;
          updateSlides();
        }
      } else if (e.key === 'ArrowLeft') {
        if (currentSlide > 0) {
          currentSlide--;
          updateSlides();
        }
      }
    });

    // Initialize
    updateSlides();
  </script>
</body>
</html>
